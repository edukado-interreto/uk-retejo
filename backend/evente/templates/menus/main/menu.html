{% load menu_tags %}{% for item in menu_items %}
<li class="{% if item.has_children_in_menu %}menu-item-has-children {% endif %}block relative [list-style:none] group {{ item.active_class }}">
  <a class="before:absolute before:content-[&quot;&quot;] before:w-0 before:h-1 before:[transition:all_0.4s_ease] before:rounded-[10px] before:left-auto before:right-0 before:bottom-10 before:bg-secondary hover:before:w-full hover:before:left-0 hover:before:right-auto font-medium text-sm uppercase text-white flex items-center relative z-[1] xl:mx-3.5 my-0 p-[38px_0px] min-[1200px]:max-[1399px]:mx-[18px] min-[1200px]:max-[1399px]:my-0 min-[1200px]:max-[1399px]:p-[38px_0px]" href="{{ item.href }}">
    {% firstof item.text item.page %}
  </a>{% if item.has_children_in_menu %}
  <ul class="sub-menu xl:absolute min-w-[240px] origin-[0_0] [transition:all_0.3s_ease-out_0s] shadow-[0px_30px_70px_0px_rgba(137,139,142,0.15)] block xl:invisible xl:opacity-0 z-[9] m-0 px-0 py-[18px] rounded-none xl:scale-x-100 xl:scale-y-0 left-0 top-full bg-white group-hover:xl:opacity-100 group-hover:xl:visible group-hover:xl:scale-100" tabindex="-1">{% sub_menu item %}</ul>{% endif %}
</li>{% endfor %}
