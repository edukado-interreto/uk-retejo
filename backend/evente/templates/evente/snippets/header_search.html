<!-- header-search -->
<div class="search__popup fixed w-full backdrop-blur-[10px] z-[99999999] pt-[70px] pb-[100px] top-0 inset-x-0 bg-white [transform:translateY(calc(-100%_-_80px))] [transition:transform_0.3s_ease-in-out,opacity_0.3s_ease-in-out] delay-[0.5s] max-[575px]:pb-[50px]">
    <div class="container">
        <div class="row">
            <div class="w-full flex-[0_0_auto] px-[12px]">
                <div class="search__wrapper">
                    <div class="search__close absolute z-[2] right-[2%] top-[10%]">
                        <button type="button" class="search-close-btn text-primary cursor-pointer m-0 p-0 [border:none] bg-[transparent]">
                            <svg width="18" height="18" viewBox="0 0 18 18" fill="none"
                                xmlns="http://www.w3.org/2000/svg">
                                <path d="M17 1L1 17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                                    stroke-linejoin="round"></path>
                                <path d="M1 1L17 17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                                    stroke-linejoin="round"></path>
                            </svg>
                        </button>
                    </div>
                    <div class="search__form">
                        <form action="#">
                            <div class="search__input relative h-20 -translate-y-10 [transition:all_0.3s_ease-out_0s] [transition-delay:0.5s] opacity-0 after:absolute after:content-[&quot;&quot;] after:w-[0%] after:h-px after:[transition-delay:0.3s] after:left-0 after:bottom-0 after:[transition:all_0.3s_ease-out_0s] after:bg-primary max-[575px]:h-[50px]">
                                <input class="search-input-field w-full h-full text-2xl text-black pr-[30px] p-0 [border-bottom:1px_solid_transparent] bg-[transparent] [outline:0] max-[575px]:text-lg placeholder:text-2xl placeholder:max-[575px]:text-lg" type="text" placeholder="Type keywords here">
                                <span class="search-focus-border"></span>
                                <button class="absolute text-lg text-primary p-0 [border:none] right-0 top-2/4 bg-[transparent] [transform:translateY(-50%)]" type="submit">
                                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none"
                                        xmlns="http://www.w3.org/2000/svg">
                                        <path d="M9.55 18.1C14.272 18.1 18.1 14.272 18.1 9.55C18.1 4.82797 14.272 1 9.55 1C4.82797 1 1 4.82797 1 9.55C1 14.272 4.82797 18.1 9.55 18.1Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
                                        <path d="M19.0002 19.0002L17.2002 17.2002" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
                                    </svg>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<div class="search-popup-overlay fixed w-full h-full z-[99] delay-[0.5s] opacity-0 invisible right-0 top-0 bg-[#000d25] [transition:all_0.3s_ease-out_0s]"></div>
<!-- header-search-end -->
