{% load wagtailcore_tags %}<article class="program-proposal prose">
  {% for block in value %}
    {% if block.block_type == "title_day" %}
      <h2 class="title-day">{{ block.value.title }}</h2>
    {% else %}
      <div class="accordion">
        <details open>
        {% include_block block %}
        </details>
      </div>
    {% endif %}
  {% endfor %}
</article>
