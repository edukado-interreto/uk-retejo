{% extends "evente/page.html" %}
{% load static wagtailcore_tags django_vite %}

{% block body_class %}registration{% endblock %}

{% block content %}
    {{ page.body|richtext }}

  <section class="container">
    <div id="vue-{{ page.vue_module }}"></div>
  </section>

  {% vite_asset page.entrypoint %}

<style>
    section.container {
        min-height: 90vh;
        margin-block: 4rem;
    }

    form.mainform h3, form.mainform h4 {
        color: var(--color-primary);
        background: none;
        border-bottom: var(--color-secondary) 1px solid;
        font-family: var(--font-unbounded);
    }
    
    h1.n-h1, h2.n-h2, h3.n-h3, h4.n-h4 {
        font-family: var(--font-unbounded);
    }
</style>
{% endblock content %}
