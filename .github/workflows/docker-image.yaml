name: Docker Image Build and Push

on:
  push:
    branches: [ "main" ]
jobs:
  build:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate today’s date and commit hash
        id: gen_tags
        run: |
          echo "DATE=$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"
          echo "SHORT_COMMIT_HASH=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "COMMIT_HASH=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        id: docker-build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: production
          build-args: |
            COMMIT_HASH=${{ steps.gen_tags.outputs.SHORT_COMMIT_HASH }}
            GIT_BRANCH=${{ github.ref_name }}
            VITE_OUT_DIR=apps/registration/static/vue
          tags: |
            ghcr.io/${{ github.repository }}/django:latest
            ghcr.io/${{ github.repository }}/django:${{ steps.gen_tags.outputs.DATE }}
            ghcr.io/${{ github.repository }}/django:${{ steps.gen_tags.outputs.COMMIT_HASH }}
            ghcr.io/${{ github.repository }}/django:${{ steps.gen_tags.outputs.SHORT_COMMIT_HASH }}
